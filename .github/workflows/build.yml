name: Build & Release Remo APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── google-services.json ──────────────────────────────────────────────
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret not set, using dummy file"
            printf '%s\n' '{' \
              '"project_info": {"project_number": "000000000000", "project_id": "remo-app-dummy", "storage_bucket": "remo-app-dummy.appspot.com"},' \
              '"client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": {"package_name": "com.remo.app"}}, "oauth_client": [], "api_key": [{"current_key": "dummy_api_key"}], "services": {"appinvite_service": {"other_platform_oauth_client": []}}}],' \
              '"configuration_version": "1"' \
              '}' > app/google-services.json
          fi

      # ── Keystore: decode from secret or generate a fresh one ─────────────
      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from GitHub Secret"
            echo "$KEYSTORE_BASE64" | base64 --decode > remo-release.keystore
          else
            echo "No KEYSTORE_BASE64 secret found – generating a temporary keystore for this build"
            keytool -genkeypair \
              -keystore remo-release.keystore \
              -alias remo-key \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Remo, OU=Dev, O=Remo, L=Unknown, ST=Unknown, C=US"
            # Export so Gradle can read them below
            echo "KEY_ALIAS=remo-key"      >> $GITHUB_ENV
            echo "KEY_PASSWORD=android"    >> $GITHUB_ENV
            echo "STORE_PASSWORD=android"  >> $GITHUB_ENV
          fi
          # Make path available to Gradle
          echo "KEYSTORE_PATH=$PWD/remo-release.keystore" >> $GITHUB_ENV
          # Fall back to defaults if secrets were empty
          echo "KEY_ALIAS=${KEY_ALIAS:-remo-key}"          >> $GITHUB_ENV
          echo "KEY_PASSWORD=${KEY_PASSWORD:-android}"     >> $GITHUB_ENV
          echo "STORE_PASSWORD=${STORE_PASSWORD:-android}" >> $GITHUB_ENV

      - name: Print SHA certificate fingerprints
        run: |
          echo "=== SHA-1 and SHA-256 fingerprints for Firebase ==="
          keytool -list -v \
            -keystore remo-release.keystore \
            -alias "${KEY_ALIAS:-remo-key}" \
            -storepass "${STORE_PASSWORD:-android}" \
            -keypass "${KEY_PASSWORD:-android}" \
            2>/dev/null | grep -E "SHA1:|SHA256:"
          echo "===================================================="
        env:
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Debug build ───────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remo-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── Release build (signed) ────────────────────────────────────────────
      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remo-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      # ── GitHub Release (only on push to main, not PRs) ───────────────────
      - name: Get short commit SHA
        if: github.event_name != 'pull_request'
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.SHORT_SHA }}
          name: "Remo build-${{ env.SHORT_SHA }}"
          body: |
            Automated release from commit `${{ github.sha }}`

            **Install:** Download `Remo-release.apk` below and install on your Android device.
            > Make sure "Install from unknown sources" is enabled in your device settings.
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
